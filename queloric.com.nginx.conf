# /etc/nginx/sites-available/queloric.com

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name queloric.com www.queloric.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name queloric.com www.queloric.com;

    ssl_certificate     /etc/letsencrypt/live/queloric.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/queloric.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy everything to the Next.js app
    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # If you have a static HTML site in /var/www/html/static,
    # serve it at /static — adjust path/prefix as needed
    location /static/ {
        alias /var/www/html/static/;
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
